<!DOCTYPE html>
<html lang="pt">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Vivências Quebrada – Mapas</title>

    <link rel="stylesheet" href="./style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">

    <style>
      .map-selector {
        display: flex;
        gap: 0.5rem;
        flex-wrap: wrap;
        margin-bottom: 1rem;
      }
      .map-container img {
        width: 100%;
        height: auto;
        border-radius: 0.5rem;
      }
    </style>
  </head>

  <body>
		<nav class="container-fluid">
            <ul></ul>
			<ul>
				<li><a href="index.html">Sobre o projeto</a></li>
                <li><a href="guaianacity.html">GuaianaCity</a></li>
                <li><a href="memorias_quebrada.html">Memórias Quebrada</a></li>
                <li><a href="cartografia.html">A cartografia negra de Guaianases</a></li>
			</ul>
		</nav>

    <main class="container">
      <h2>A cartografia negra de Guaianases</h2>

      <div class="map-selector">
          <button onclick="loadMap('local')">Localização da Subprefeitura de Guaianases</button>
          <button onclick="loadMap('cor_ipvs')">Subprefeitura de Guaianases segundo cor/raça e IPVS</button>
          <button onclick="loadMap('fav_pret')">A Cor das Favelas de Guaianases</button>
          <button onclick="loadMap('fav_ipvs')">A Vulnerabilidade Social das Favelas de Guaianases</button>
          <button onclick="loadMap('irreg_pret')">A Cor dos Loteamentos Irregulares de Guaianases</button>
          <button onclick="loadMap('irreg_ipvs')">A Vunerabilidade Social dos Loteamentos Irregulares de Guaianases</button>
      </div>

      <div class="map-container">
        <img id="mapImage" src="mapas_guaianases/ok_local_guai.png" alt="Mapa de Guaianases">
      </div>
    </main>

    <script>
      const mapPaths = {
        local: "mapas_guaianases/ok_local_guai.png",
        cor_ipvs: "mapas_guaianases/ok_guaian_cor_ipvs.png",
        fav_pret: "mapas_guaianases/ok_guaianaz_fav_pret.png",
        fav_ipvs: "mapas_guaianases/ok_guaianaz_fav_ipvs.png",
        irreg_pret: "mapas_guaianases/ok_guaianaz_irreg_pret.png",
        irreg_ipvs: "mapas_guaianases/ok_guaianaz_irreg_ipvs.png",
      };

      function loadMap(type) {
        const img = document.getElementById("mapImage");
        img.src = mapPaths[type];
        img.alt = `Mapa de Guaianases – ${type}`;
      }
    </script>
  </body>
</html>
